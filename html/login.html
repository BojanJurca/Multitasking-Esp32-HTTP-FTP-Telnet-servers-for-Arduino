<!DOCTYPE html>
<html lang='en'>
    <head>

		<meta charset='UTF-8'>
    	<meta http-equiv='X-UA-Compatible' content='IE=edge'>
    	<meta name='viewport' content='width=device-width, initial-scale=1.0'>

		<!-- don't cache - at least during development -->
		<meta http-equiv='Cache-Control' content='no-cache, no-store, must-revalidate, max-age=0'>
		<meta http-equiv='Pragma' content='no-cache'>
		<meta http-equiv='Expires' content='0'>

    	<link rel='icon' type='image/png' sizes='192x192' href='android-192.png'>
    	<link rel='apple-touch-icon' sizes='180x180' href='apple-180.png'>

        <style>
            body {
                font-family: Verdana, sans-serif;
                margin: 10px;
                background: #ffffff;
            }

            .card {
                background: #fafafa;
                border: 1px solid #ccc;
                border-radius: 10px;
                padding: 16px;
                max-width: 420px;
                margin: 60px auto;
            }

            .title {
                font-size: 26px;
                font-weight: bold;
                color: hsl(207, 90%, 30%);
                margin-bottom: 14px;
                text-align: center;
            }

            .row {
                display: flex;
                flex-direction: column;
                margin-bottom: 14px;
            }

            .label {
                font-size: 20px;
                color: gray;
                margin-bottom: 4px;
            }

            input {
                padding: 8px;
                font-size: 18px;
                border: 1px solid #bbb;
                border-radius: 6px;
            }

            input:focus {
                outline: none;
                border-color: hsl(207, 90%, 40%);
            }

            a:link, a:visited {
                color: gray;
                text-decoration: none;
                cursor: auto;
            }
            a:hover {
                color: hsl(207, 90%, 40%);
                cursor:pointer;
            }
            a:link:active, a:visited:active {
                color: gray;
            }

            dialog[open] {
                font-family: Verdana, sans-serif;
                font-size: 32px;
                color: white;
                background-color: rgba(200, 0, 0, 0.92);
                border: none;
                border-radius: 12px;
                padding: 18px 26px;
                box-shadow: 0 4px 18px rgba(0, 0, 0, 0.35);
                position: fixed;
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%);
                animation: fadeInScale 0.18s ease-out;
            }
            @keyframes fadeInScale {
                from {
                    opacity: 0;
                    transform: translate(-50%, -50%) scale(0.92);
                }
                to {
                    opacity: 1;
                    transform: translate(-50%, -50%) scale(1);
                }
            }

            body {
                font-family: Verdana, sans-serif;
                margin: 10px;
                overflow-wrap: break-word;
            }

            .card {
                background: #fafafa;
                border: 1px solid #ccc;
                border-radius: 10px;
                padding: 12px;
                margin-bottom: 14px;
            }
            .title {
                font-size: 26px;
                font-weight: bold;
                color: hsl(207, 90%, 30%);
                margin-bottom: 8px;
            }
            .row {
                display: flex;
                flex-wrap: wrap;
                width: 100%;
                margin-bottom: 6px;
            }
            .label {
                flex: 1 1 60%;
                font-size: 22px;
                color: gray;
            }
            .value {
                flex: 1 1 40%;
                font-size: 24px;
                color: black;
                text-align: right;
            }

            .button {
                padding: 10px 20px;
                font-size: 18px;
                border-radius: 10px;
                border: none;
                color: white;
                cursor: pointer;
            }
            .button:active {
                transform: translateY(3px)
            }
            .button:disabled {
                background-color: #aaa !important;
            }
            .button1 {
                background-color: hsl(207, 90%, 40%)
            }
            .button1:hover {
                background-color: hsl(207, 90%, 30%)
            }
            .button1:active {
                background-color: hsl(207, 90%, 30%);
            }

        </style>
    </head>

    <body>
		<!-- error message -->
		<dialog id='errDialog'></dialog>


		<br><br>


		<div class='card'>
			<div class='title'>Please login</div>
			<div class='row'>
				<div class='label'>Hint: try typing in user and password</div>
                <input type='text' id='username'>
			</div>
			<div class='row'>
                <input type='password' id='password'>
			</div>
                <div style='text-align:right;''>
                    <button class='button button1' id='login' onclick="login(document.getElementById('username').value, document.getElementById('password').value)">Login</button>
                </div>
			</div>
        </div>


		<script type='text/javascript'>

            async function login(username, password) {

                // get redirect argument from URL
                const params = new URLSearchParams(window.location.search);
                let redirect = params.get('redirect');

                // security: must be internal path
                if (!redirect || !redirect.startsWith('/'))
                    redirect = '/index.html';

                // call login REST API
                const reply = await httpRequest('/login/' + username + '/' + password, 'POST');

                // redirect if OK
                if (reply === 'OK')
                    window.location.replace(redirect);
                else
                    alert(reply);
            }


			// -------------------------------------------------------------
			// ERROR MESSAGE
			// -------------------------------------------------------------
			let errorMessageTimeout = null;

			function errorMessage(msg) {
				clearTimeout(errorMessageTimeout);
				errDialog.textContent = msg;
				errDialog.showModal();
				errorMessageTimeout = setTimeout(() => errDialog.close(), 3000);
			}


			// -------------------------------------------------------------
			// GLOBAL FETCH CLIENT WITH TIMEOUT
			// -------------------------------------------------------------
			async function httpRequest(url, method = 'GET') {
				const controller = new AbortController();
				const t = setTimeout(() => controller.abort(), 5000);

				try {
					const response = await fetch(url, {
						method,
						signal: controller.signal
					});

					clearTimeout(t);

					if (!response.ok)
						throw new Error('Server reported error ' + response.status);

					return await response.text();

				} catch (err) {
					if (err.name === 'AbortError')
						errorMessage('Server did not reply in time.');
					else
						errorMessage(err.message);

					throw err;
				}
			}


            window.addEventListener('DOMContentLoaded', () => {
                const user = document.getElementById('username');
                const pass = document.getElementById('password');
                const btn  = document.getElementById('login');
                const hint = document.querySelector('.label');

                if (location.protocol !== 'https:') {
                    // disable inputs and button
                    user.disabled = true;
                    pass.disabled = true;
                    btn.disabled  = true;
                    
                    // build HTTPS URL with same path + params and clickable link
                    hint.innerHTML = 'Login requires safe HTTPS protocol.<br><a href=https://' + location.host + location.pathname + location.search + '>Switch to HTTPS now.</a>';
                }
            });

		</script>

    </body>
</html>
